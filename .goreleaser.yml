version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: tp
    main: ./cmd/tp
    binary: tp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: treepad
    binaries:
      - tp
    homepage: "https://github.com/O-Marsters-1997/treepad"
    description: "CLI for managing git worktrees"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tp"]
    url:
      template: "https://github.com/O-Marsters-1997/treepad/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      verified: "github.com/O-Marsters-1997/treepad/"
    repository:
      owner: O-Marsters-1997
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Cask update: {{ .ProjectName }} {{ .Tag }}"
    directory: Casks
